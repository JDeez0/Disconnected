
services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "grandchat", "-d", "grandchat" ]
      interval: 1s
      timeout: 5s
      retries: 10
    environment:
      - POSTGRES_USER=grandchat
      - POSTGRES_PASSWORD=grandchat
      - POSTGRES_DB=grandchat
    expose:
      - 5432
    ports:
      - 5432:5432
    command: ["postgres", "-c", "wal_level=logical", "-c", "wal_writer_delay=10ms"]

  backend:
    build: ./backend
    restart: unless-stopped
    volumes:
      - ./backend:/usr/src/app
    expose:
      - 8000
    environment:
      - DB_NAME=postgres
      - DB_USER=postgres.zspnixccneconhqgaatg
      - DB_PASSWORD=REPLACE_WITH_YOUR_SUPABASE_PASSWORD
      - DB_HOST=aws-1-us-east-1.pooler.supabase.com
      - DB_PORT=6543
    depends_on:
      db:
        condition: service_healthy

  migrations:
    build: ./backend
    restart: on-failure
    command: >
      python manage.py migrate
    environment:
      - DB_NAME=postgres
      - DB_USER=postgres.zspnixccneconhqgaatg
      - DB_PASSWORD=REPLACE_WITH_YOUR_SUPABASE_PASSWORD
      - DB_HOST=aws-1-us-east-1.pooler.supabase.com
      - DB_PORT=6543
    depends_on:
      db:
        condition: service_healthy

  frontend:
    stdin_open: true
    build: ./mobile
    # volumes:
    #   - ./mobile:/usr/src/app
    #   - /usr/src/app/node_modules
    expose:
      - 8081
    environment:
      - NODE_ENV=development
      - CI=1
    depends_on:
      - backend

  centrifugo:
    image: centrifugo/centrifugo:v6
    restart: unless-stopped
    volumes:
      - ./centrifugo:/centrifugo
    command: centrifugo -c config.json
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.25
    restart: unless-stopped
    volumes:
      - ./nginx:/etc/nginx/
    ports:
      - 9000:80
    depends_on:
      - backend
      - frontend
      - centrifugo

  redis:
    image: redis:${REDIS_VERSION:-7}-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus:v3.0.1
    depends_on:
      - centrifugo
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana-oss:11.4.0
    depends_on:
      - prometheus
    # Expose Grafana on host port 3000
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      # Mount local provisioning directory to automatically configure Prometheus as a datasource
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana

volumes:
  postgres_data:
  grafana-data:
